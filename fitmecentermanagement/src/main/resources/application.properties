# Application
spring.application.name=fitmecentermanagement
server.port=8080

# Database MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/fitnessdb?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Fitme@2026!
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Jackson
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=GMT+7

# Logging
logging.level.com.example.fitmecenter=DEBUG
logging.level.org.springframework.web=DEBUG